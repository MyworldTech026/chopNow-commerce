<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChopNow — Checkout</title>
  <link rel="stylesheet" href="checkout.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Chop<span>Now</span></a>
      <div class="nav-right">
        <button class="js-theme-toggle theme-toggle" aria-label="Toggle theme">
          <span class="dark-icon">☀️</span>
          <span class="light-icon">🌙</span>
        </button>
        <a href="cart.html" class="js-cart-btn cart-btn">
          <span class="cart-icon">🛒</span>
          <span class="js-cart-count cart-count hidden">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-inner">
      <a href="cart.html" class="back-btn">← Back to Cart</a>
      <h1 class="page-title">Checkout</h1>
    </div>
  </div>

  <!-- PROGRESS STEPS -->
  <div class="steps-wrap">
    <div class="steps-inner">
      <div class="step completed">
        <div class="step-circle">✓</div>
        <div class="step-label">Cart</div>
      </div>
      <div class="step-line completed"></div>
      <div class="step active">
        <div class="step-circle">2</div>
        <div class="step-label">Checkout</div>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">3</div>
        <div class="step-label">Confirmation</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main">
    <div class="main-inner">

      <!-- LEFT — CHECKOUT FORM -->
      <section class="form-section">

        <!-- DELIVERY INFO -->
        <div class="form-card">
          <div class="form-card-header">
            <span class="form-card-icon">📍</span>
            <h2 class="form-card-title">Delivery Information</h2>
          </div>

          <form class="js-checkout-form checkout-form">

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">First Name <span class="required">*</span></label>
                <input type="text" class="js-firstname form-input" placeholder="John" />
              </div>
              <div class="form-group">
                <label class="form-label">Last Name <span class="required">*</span></label>
                <input type="text" class="js-lastname form-input" placeholder="Doe" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Email Address <span class="required">*</span></label>
              <input type="email" class="js-email form-input" placeholder="john@example.com" />
            </div>

            <div class="form-group">
              <label class="form-label">Phone Number <span class="required">*</span></label>
              <input type="tel" class="js-phone form-input" placeholder="+234 800 000 0000" />
            </div>

            <div class="form-group">
              <label class="form-label">Delivery Address <span class="required">*</span></label>
              <input type="text" class="js-address form-input" placeholder="House number, Street name" />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">City <span class="required">*</span></label>
                <input type="text" class="js-city form-input" placeholder="Lagos" />
              </div>
              <div class="form-group">
                <label class="form-label">State <span class="required">*</span></label>
                <select class="js-state form-select">
                  <option value="">Select state</option>
                  <option>Abia</option>
                  <option>Adamawa</option>
                  <option>Akwa Ibom</option>
                  <option>Anambra</option>
                  <option>Bauchi</option>
                  <option>Bayelsa</option>
                  <option>Benue</option>
                  <option>Borno</option>
                  <option>Cross River</option>
                  <option>Delta</option>
                  <option>Ebonyi</option>
                  <option>Edo</option>
                  <option>Ekiti</option>
                  <option>Enugu</option>
                  <option>FCT</option>
                  <option>Gombe</option>
                  <option>Imo</option>
                  <option>Jigawa</option>
                  <option>Kaduna</option>
                  <option>Kano</option>
                  <option>Katsina</option>
                  <option>Kebbi</option>
                  <option>Kogi</option>
                  <option>Kwara</option>
                  <option>Lagos</option>
                  <option>Nasarawa</option>
                  <option>Niger</option>
                  <option>Ogun</option>
                  <option>Ondo</option>
                  <option>Osun</option>
                  <option>Oyo</option>
                  <option>Plateau</option>
                  <option>Rivers</option>
                  <option>Sokoto</option>
                  <option>Taraba</option>
                  <option>Yobe</option>
                  <option>Zamfara</option>
                </select>
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label">Delivery Note (Optional)</label>
              <textarea class="js-note form-textarea" placeholder="Any special instructions for delivery..." rows="3"></textarea>
            </div>

          </form>
          
        </div>
         <div class="js-fillallfield checkout-error hidden">fill all field except optional</div>
        <!-- PAYMENT METHOD -->
        <div class="form-card">
          <div class="form-card-header">
            <span class="form-card-icon">💳</span>
            <h2 class="form-card-title">Payment Method</h2>
          </div>

          <div class="payment-options">
            <label class="payment-option active">
              <input type="radio" name="payment" value="paystack" checked class="payment-radio" />
              <div class="payment-option-inner">
                <div class="payment-option-left">
                  <div class="payment-option-name">Pay with Paystack</div>
                  <div class="payment-option-desc">Card, Bank Transfer, USSD</div>
                </div>
                <div class="payment-badge">Recommended</div>
              </div>
            </label>

            <label class="payment-option">
              <input type="radio" name="payment" value="cash" class="payment-radio" />
              <div class="payment-option-inner">
                <div class="payment-option-left">
                  <div class="payment-option-name">Pay on Delivery</div>
                  <div class="payment-option-desc">Cash payment when order arrives</div>
                </div>
              </div>
            </label>
          </div>
        </div>

        <!-- ERROR MESSAGE -->
        <div class="js-checkout-error checkout-error hidden"></div>

        <!-- PLACE ORDER BUTTON -->
        <button class="js-place-order place-order-btn">
          🔒 Place Order & Pay
        </button>

      </section>

      <!-- RIGHT — ORDER SUMMARY -->
      <aside class="summary-section">
        <div class="summary-card">
          <h2 class="summary-title">Order Summary</h2>

          <!-- ORDER ITEMS -->
          <div class="js-order-items order-items"></div>

          <div class="summary-divider"></div>

          <div class="summary-rows">
            <div class="summary-row">
              <span class="summary-label">Subtotal</span>
              <span class="js-subtotal summary-value">₦0.00</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Delivery Fee</span>
              <span class="js-delivery summary-value">₦1000.00</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Service Fee</span>
              <span class="js-service summary-value">₦100.00</span>
            </div>
          </div>

          <div class="summary-divider"></div>

          <div class="summary-row total-row">
            <span class="total-label">Total</span>
            <span class="js-total total-value">₦0.00</span>
          </div>

          <div class="summary-note">
            🔒 Secured by Paystack
          </div>

        </div>
      </aside>

    </div>
  </main>

  <!-- TOAST -->
  <div class="js-toast toast hidden"></div>

  <!-- <script type="module" src="js/app.js"></script> -->
   <script src="https://js.paystack.co/v2/inline.js"></script>
  <script type="module" src="checkout.js"></script>
</body>
</html>
